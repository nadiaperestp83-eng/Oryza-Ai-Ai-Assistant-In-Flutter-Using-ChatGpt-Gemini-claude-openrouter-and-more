name: ai_assistant
description: An AI Assistant (ChatBot, Image Generator & Language Translator) App Based on ChatGPT developed by Harsh H. Rajpurohit 

publish_to: 'none' 

version: 1.0.2+2

environment:
  sdk: '>=3.4.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  lottie: ^3.1.2

  hive: ^2.2.3
  hive_flutter: ^1.1.0

  path_provider: ^2.1.3

  get: ^4.6.6

  flutter_animate: ^4.5.0
  animated_text_kit: ^4.2.2

  http: ^1.2.2
  google_fonts: ^6.2.1
  speech_to_text: ^7.0.0
  flutter_tts: ^4.0.0
  audioplayers: ^6.1.0

  dart_openai: ^5.1.0
  cached_network_image: ^3.3.1
  video_player: ^2.9.2
  


  translator_plus: ^1.0.1

  image_gallery_saver_plus: ^5.0.0

  share_plus: ^12.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  image_path: "assets/icon/ic_launcher_foreground.png"
  adaptive_icon_background: "assets/icon/ic_launcher_background.png"
  adaptive_icon_foreground: "assets/icon/ic_launcher_foreground.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/lottie/
    - assets/icon/
