name: Build APK

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'

      - name: Configurar chaves
        run: |
          sed -i "s/String apiKey = '';/String apiKey = '${{ secrets.GEMINI_KEY }}';/" lib/helper/global.dart
          sed -i "s/String claudeKey = '';/String claudeKey = '${{ secrets.CLAUDE_KEY }}';/" lib/helper/global.dart
          sed -i "s/String groqKey = '';/String groqKey = '${{ secrets.GROQ_KEY }}';/" lib/helper/global.dart
          sed -i "s/String deepseekKey = '';/String deepseekKey = '${{ secrets.DEEPSEEK_KEY }}';/" lib/helper/global.dart
          sed -i "s/String openrouterKey = '';/String openrouterKey = '${{ secrets.OPENROUTER_KEY }}';/" lib/helper/global.dart
          sed -i "s/String cloudflareKey = '';/String cloudflareKey = '${{ secrets.CLOUDFLARE_KEY }}';/" lib/helper/global.dart
          sed -i "s/String openaiKey = '';/String openaiKey = '${{ secrets.OPENAI_KEY }}';/" lib/helper/global.dart
          sed -i "s/String cerebrasKey = '';/String cerebrasKey = '${{ secrets.CEREBRAS_KEY }}';/" lib/helper/global.dart
          sed -i "s/String huggingfaceKey = '';/String huggingfaceKey = '${{ secrets.HUGGINGFACE_KEY }}';/" lib/helper/global.dart
          sed -i "s/String bazaarKey = '';/String bazaarKey = '${{ secrets.BAZAAR_KEY }}';/" lib/helper/global.dart
          sed -i "s/String serpapiKey = '';/String serpapiKey = '${{ secrets.SERPAPI_KEY }}';/" lib/helper/global.dart
          sed -i "s/String magicHourKey = '';/String magicHourKey = '${{ secrets.MAGICHOURKEY }}';/" lib/helper/global.dart

      - name: Get packages
        run: flutter pub get

      - name: Gerar ícone do app
        run: flutter pub run flutter_launcher_icons

      - name: Build APK
        run: flutter build apk --release

      - name: Listar APKs gerados
        if: always()
        run: find . -name "*.apk" 2>/dev/null || echo "Nenhum APK encontrado"

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-assistant-apk
          path: "**/*.apk"
